version: "3.9"

services:
  # 🔥 Fire Detection Service
  fire-detector:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fire-detector
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=staging
      - REDIS_URL=redis://redis:6379/0
      - DEBUG=false
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - fire-network
    volumes:
      # Optional: mount local image for processing
      - ./uploads:/app/uploads
      - ./logs:/app/logs

  # 📦 Redis for caching, rate limiting, cost tracking
  redis:
    image: redis:7-alpine
    container_name: fire-redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - fire-network
    volumes:
      - redis_data:/data

networks:
  fire-network:
    driver: bridge

volumes:
  redis_data:
    driver: local
